user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 256; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;
    client_max_body_size 100m;

    server {
        listen 127.0.0.1:8080;
        server_name _;
        access_log off;

        location = /healthz {
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME /var/www/html/health.php;
            fastcgi_param  SCRIPT_NAME     /health.php;
            fastcgi_pass   127.0.0.1:9000;
        }

        location / { return 404; }
    }

    server {
        listen 64444 ssl;
        http2 on;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "no-store" always;

        # 用 http:// 访问 SSL 端口时返回 400 而非直接断连（避免 ERR_CONNECTION_CLOSED）
        error_page 497 @http_redirect;
        location @http_redirect {
            return 301 https://$host:64444$request_uri;
        }

        # 所有请求统一交给 index.php；Secret Path 校验后再由 PHP 分发 API。
        # 不允许绕过隐藏路径直接执行 /api/*.php 或其他 PHP 文件。
        location ^~ / {
            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME /var/www/html/index.php;
            fastcgi_param  SCRIPT_NAME     /index.php;
            fastcgi_param  REQUEST_URI     $request_uri;
            fastcgi_param  HTTPS           on;
            fastcgi_pass   127.0.0.1:9000;
            fastcgi_connect_timeout 5s;
            fastcgi_read_timeout 120s;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 16 32k;
            fastcgi_busy_buffers_size 64k;
        }
    }
}
