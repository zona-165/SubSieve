services:
  gateway:
    build: ./gateway
    container_name: subscribe-gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "${GATEWAY_PORT:-443}:443"
    environment:
      - V2B_BACKEND=${V2B_BACKEND}
      - V2B_HOST=${V2B_HOST}
      - SUBSCRIBE_PATH=${SUBSCRIBE_PATH:-/api/v1/client/subscribe}
      - AXISNOW_TRUSTED_IPS=${AXISNOW_TRUSTED_IPS:-}
      - REAL_IP_HEADER=${REAL_IP_HEADER:-X-Forwarded-For}
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 60s

  admin:
    build: ./admin
    container_name: subscribe-admin
    restart: unless-stopped
    ports:
      - "64444:64444"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS}
      - ADMIN_SECRET_PATH=${ADMIN_SECRET_PATH}
      - GATEWAY_PORT=${GATEWAY_PORT:-443}
      - LOG_RETENTION_DAYS=${LOG_RETENTION_DAYS:-14}
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
      - gw_config:/etc/nginx/subscribe
      - gw_logs:/var/log/subscribe
    healthcheck:
      test: ["CMD", "php", "-r", "exit(trim((string)@file_get_contents('http://127.0.0.1:8080/healthz')) === 'ok' ? 0 : 1);"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 20s

volumes:
  gw_config:
  gw_logs:
